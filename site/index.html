<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Container Kaart</title>
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<style>
		body { margin: 0; padding: 8px; }
		#map { width: 100%; height: 40vh; }
		.leaflet-interactive:focus { outline: none; }
		.container-marker { background: none; border: none; }
		.container-marker--selected { filter: drop-shadow(3px 0 2px #1d6fa4) drop-shadow(-3px 0 2px #1d6fa4) drop-shadow(0 3px 2px #1d6fa4) drop-shadow(0 -3px 2px #1d6fa4); }
	</style>
</head>
<body>
	<!-- Hidden SVG sprite — defines gradients and the container symbol once for all markers -->
	<svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden">
		<symbol id="container-icon" viewBox="0 0 200 200">
			<defs>
				<linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
					<stop offset="5%"   stop-color="#517294" />
					<stop offset="20%"  stop-color="#6E92B6" />
					<stop offset="30%"  stop-color="#517294" />
				</linearGradient>
				<linearGradient id="barrelGradient" x1="0%" y1="0%" x2="0%" y2="100%">
					<stop offset="0%"   stop-color="#5D6D7E" />
					<stop offset="35%"  stop-color="#ECF0F1" />
					<stop offset="50%"  stop-color="#FFFFFF" />
					<stop offset="65%"  stop-color="#ECF0F1" />
					<stop offset="100%" stop-color="#5D6D7E" />
				</linearGradient>
			</defs>
			<rect x="25" y="155" width="150" height="33" rx="8" fill="#BDC3C7" />
			<rect x="25" y="180" width="150" height="8" fill="#95A5A6" />
			<path d="M50 165 L50 80 L60 65 Q60 55 70 55 L130 55 Q140 55 140 65 L150 80 L150 165 Z" fill="url(#bodyGradient)" />
			<rect x="65" y="125" width="4" height="25" rx="2" fill="#2C3E50" />
			<rect x="131" y="125" width="4" height="25" rx="2" fill="#2C3E50" />
			<rect x="70" y="70" width="60" height="50" rx="8" fill="url(#barrelGradient)" />
			<path d="M85 109 Q100 120 115 109" stroke="#7F8C8D" stroke-width="3" fill="none" stroke-linecap="round" />
			<rect x="90" y="30" width="20" height="25" fill="#95A5A6" />
			<ellipse cx="100" cy="45" rx="20" ry="4" fill="#BDC3C7" />
			<ellipse cx="100" cy="30" rx="16" ry="3" fill="#BDC3C7" />
		</symbol>
	</svg>

	<div id="map"></div>
	<button id="locate-btn">📍</button>
	<select id="container-select">
		<option value="">— select container —</option>
	</select>
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	<script type="application/json" id="container-data">
[
{"lat":52.0914209,"lon":5.0545399,"zip":"3544DD","oc":"8005","street":"Bladvlinder"},
{"lat":52.0918384,"lon":5.0562544,"zip":"3544DV","oc":"3903","street":"Weerschijnvlinder"},
{"lat":52.0920300,"lon":5.0571654,"zip":"3544DT","oc":"3465","street":"Weerschijnvlinder"},
{"lat":52.0922847,"lon":5.0577451,"zip":"3544DV","oc":"3345","street":"Weerschijnvlinder"},
{"lat":52.0924298,"lon":5.0597370,"zip":"3544DC","oc":"7941","street":"Monarchvlinderlaan"},
{"lat":52.0927535,"lon":5.0609734,"zip":"3544DC","oc":"8011","street":"Monarchvlinderlaan"},
{"lat":52.0928809,"lon":5.0548209,"zip":"3544DB","oc":"3463","street":"Vuurvlindersingel "},
{"lat":52.0936309,"lon":5.0587977,"zip":"3544DN","oc":"7994","street":"Schoenlappervlinder"},
{"lat":52.0937189,"lon":5.0561232,"zip":"3544DL","oc":"3464","street":"Vuurvlindersingel"},
{"lat":52.0945318,"lon":5.0570537,"zip":"3544DL","oc":"8016","street":"Vuurvlindersingel"},
{"lat":52.0948640,"lon":5.0575495,"zip":"3544DM","oc":"3904","street":"Heivlinder"}
]
	</script>
	<script>
		const DEFAULT_LOCATION = [52.09358, 5.05789];
		const map = L.map('map').setView(DEFAULT_LOCATION, 16);

		L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
			attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>'
		}).addTo(map);

		let locationMarker = null;

		function goToUserLocation() {
			navigator.geolocation.getCurrentPosition(
				(pos) => {
					const { latitude, longitude } = pos.coords;
					map.setView([latitude, longitude], 16);
					if (locationMarker) locationMarker.remove();
					locationMarker = L.marker([latitude, longitude]).addTo(map);
				},
				(err) => {
					alert('Could not get your location.');
				}
			);
		}

		// If permission was already granted, go to user location immediately
		if (navigator.permissions) {
			navigator.permissions.query({ name: 'geolocation' }).then((result) => {
				if (result.state === 'granted') goToUserLocation();
			});
		}

		document.getElementById('locate-btn').addEventListener('click', goToUserLocation);

		const containers = JSON.parse(document.getElementById('container-data').textContent);
		const select = document.getElementById('container-select');
		function makeIcon(selected) {
			const size = 40;
			return L.divIcon({
				html: `<svg viewBox="0 0 200 200" width="${size}" height="${size}"><use href="#container-icon"/></svg>`,
				className: 'container-marker' + (selected ? ' container-marker--selected' : ''),
				iconSize: [size, size],
				iconAnchor: [size / 2, size],
				tooltipAnchor: [0, -size]
			});
		}

		let suppressEvents = false;

		const sorted = containers.map((c, i) => ({ c, i })).sort((a, b) => a.c.oc - b.c.oc);
		sorted.forEach(({ c, i }) => {
			const opt = document.createElement('option');
			opt.value = i;
			opt.textContent = `${c.oc} - ${c.street}`;
			select.appendChild(opt);
		});

		const markers = containers.map((c, i) => {
			const marker = L.marker([c.lat, c.lon], { icon: makeIcon(false) })
				.bindTooltip(`${c.street}<br>${c.zip}<br>${c.oc}`)
				.addTo(map);
			marker.on('click', () => {
				if (suppressEvents) return;
				suppressEvents = true;
				selectContainer(i);
				suppressEvents = false;
			});

			return marker;
		});

		let selectedIndex = null;

		function selectContainer(i) {
			if (selectedIndex !== null) markers[selectedIndex].setIcon(makeIcon(false));
			selectedIndex = i;
			markers[i].setIcon(makeIcon(true));
			map.panTo(markers[i].getLatLng());
			select.value = i;
		}

		select.addEventListener('change', () => {
			if (suppressEvents) return;
			const i = parseInt(select.value, 10);
			if (isNaN(i)) return;
			suppressEvents = true;
			selectContainer(i);
			suppressEvents = false;
		});
	</script>
</body>
</html>
