<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Container Kaart</title>
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<link rel="stylesheet" href="style.css" />
</head>
<body>
	<div id="left-panel">
		<div id="map"></div>
		<div id="controls">
			<button id="locate-btn" class="icon-btn">📍</button>
			<select id="container-select">
				<option value="" data-i18n="select_placeholder"></option>
			</select>
			<button id="lang-btn" class="icon-btn"></button>
		</div>
	</div>

	<div id="right-panel">
		<div id="condition-grid">
			<button class="condition-btn" data-condition="0">
				<svg viewBox="0 0 200 200"><use href="container-icon.svg#container-icon"/></svg>
				<span data-i18n="condition_0"></span>
			</button>
			<button class="condition-btn" data-condition="30">
				<svg viewBox="0 0 200 200"><use href="container-with-litter.svg"/></svg>
				<span data-i18n="condition_1"></span>
			</button>
			<button class="condition-btn" data-condition="70">
				<svg viewBox="0 0 200 200"><use href="container-with-bag.svg"/></svg>
				<span data-i18n="condition_2"></span>
			</button>
			<button class="condition-btn" data-condition="100">
				<svg viewBox="0 0 200 200"><use href="container-with-furniture.svg"/></svg>
				<span data-i18n="condition_3"></span>
			</button>
			<button id="submit-btn" data-i18n="submit" disabled></button>
		</div>
		<div id="status-msg"></div>
	</div>

	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	<script type="application/json" id="container-data">

{"lat":52.0922847,"lon":5.0577451,"zip":"3544DV","oc":"3345","street":"Weerschijnvlinder"},
{"lat":52.0924298,"lon":5.0597370,"zip":"3544DC","oc":"7941","street":"Monarchvlinderlaan"},
{"lat":52.0927535,"lon":5.0609734,"zip":"3544DC","oc":"8011","street":"Monarchvlinderlaan"},
{"lat":52.0928809,"lon":5.0548209,"zip":"3544DB","oc":"3463","street":"Vuurvlindersingel "},
{"lat":52.0936309,"lon":5.0587977,"zip":"3544DN","oc":"7994","street":"Schoenlappervlinder"},
{"lat":52.0937189,"lon":5.0561232,"zip":"3544DL","oc":"3464","street":"Vuurvlindersingel"},
{"lat":52.0945318,"lon":5.0570537,"zip":"3544DL","oc":"8016","street":"Vuurvlindersingel"},
{"lat":52.0948640,"lon":5.0575495,"zip":"3544DM","oc":"3904","street":"Heivlinder"}
]
	</script>
	<script>
		const translations = {
			en: {
				select_placeholder: '— select container —',
				condition_0: 'Clean',
				condition_1: 'Some litter',
				condition_2: 'Bags or similar',
				condition_3: 'Bulky waste',
				submit: 'Submit',
				sending: 'Sending…',
				submitted: 'Submitted!',
				failed: 'Failed to send — please try again.',
				location_error: 'Could not get your location.',
			},
			nl: {
				select_placeholder: '— kies container —',
				condition_0: 'Schoon',
				condition_1: 'Rommelig',
				condition_2: 'Vuilniszakken',
				condition_3: 'Grof afval',
				submit: 'Verstuur',
				sending: 'Versturen…',
				submitted: 'Verstuurd!',
				failed: 'Versturen mislukt — probeer opnieuw.',
				location_error: 'Kon je locatie niet bepalen.',
			},
		};

		const savedLocale = localStorage.getItem('locale');
		const browserLocale = navigator.language.startsWith('nl') ? 'nl' : 'en';
		let locale = savedLocale || browserLocale;

		function t(key) {
			return translations[locale][key] ?? translations.en[key] ?? key;
		}

		function applyTranslations() {
			document.documentElement.lang = locale;
			document.querySelectorAll('[data-i18n]').forEach(el => {
				el.textContent = t(el.dataset.i18n);
			});
			document.getElementById('lang-btn').textContent = locale === 'en' ? '🇳🇱' : '🇬🇧';
		}

		applyTranslations();

		document.getElementById('lang-btn').addEventListener('click', () => {
			locale = locale === 'en' ? 'nl' : 'en';
			localStorage.setItem('locale', locale);
			applyTranslations();
		});

		const DEFAULT_LOCATION = [52.09358, 5.05789];
		const map = L.map('map').setView(DEFAULT_LOCATION, 16);

		L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
			attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>'
		}).addTo(map);

		let locationMarker = null;

		function goToUserLocation() {
			navigator.geolocation.getCurrentPosition(
				(pos) => {
					const { latitude, longitude } = pos.coords;
					map.setView([latitude, longitude], 16);
					if (locationMarker) locationMarker.remove();
					locationMarker = L.marker([latitude, longitude]).addTo(map);
				},
				(err) => {
					setStatus(t('location_error'), 'error');
				}
			);
		}

		// If permission was already granted, go to user location immediately
		if (navigator.permissions) {
			navigator.permissions.query({ name: 'geolocation' }).then((result) => {
				if (result.state === 'granted') goToUserLocation();
			});
		}

		document.getElementById('locate-btn').addEventListener('click', goToUserLocation);

		const containers = JSON.parse(document.getElementById('container-data').textContent);
		const select = document.getElementById('container-select');
		function makeIcon(selected) {
			const size = 40;
			return L.divIcon({
				html: `<svg viewBox="0 0 200 200" width="${size}" height="${size}"><use href="container-icon.svg#container-icon"/></svg>`,
				className: 'container-marker' + (selected ? ' container-marker--selected' : ''),
				iconSize: [size, size],
				iconAnchor: [size / 2, size],
				tooltipAnchor: [0, -size]
			});
		}

		let suppressEvents = false;

		const sorted = containers.map((c, i) => ({ c, i })).sort((a, b) => a.c.oc - b.c.oc);
		sorted.forEach(({ c, i }) => {
			const opt = document.createElement('option');
			opt.value = i;
			opt.textContent = `${c.oc} - ${c.street}`;
			select.appendChild(opt);
		});

		const markers = containers.map((c, i) => {
			const marker = L.marker([c.lat, c.lon], { icon: makeIcon(false) })
				.bindTooltip(`${c.street}<br>${c.zip}<br>${c.oc}`)
				.addTo(map);
			marker.on('click', () => {
				if (suppressEvents) return;
				suppressEvents = true;
				selectContainer(i);
				suppressEvents = false;
			});

			return marker;
		});

		let selectedIndex = null;

		function selectContainer(i) {
			if (selectedIndex !== null) markers[selectedIndex].setIcon(makeIcon(false));
			selectedIndex = i;
			markers[i].setIcon(makeIcon(true));
			map.panTo(markers[i].getLatLng());
			select.value = i;
			updateSubmitState();
		}

		select.addEventListener('change', () => {
			if (suppressEvents) return;
			const i = parseInt(select.value, 10);
			if (isNaN(i)) return;
			suppressEvents = true;
			selectContainer(i);
			suppressEvents = false;
		});

		const submitBtn = document.getElementById('submit-btn');

		function updateSubmitState() {
			submitBtn.disabled = !select.value || !selectedCondition;
		}

		let selectedCondition = null;
		document.querySelectorAll('.condition-btn').forEach(btn => {
			btn.addEventListener('click', () => {
				if (selectedCondition) selectedCondition.classList.remove('selected');
				selectedCondition = btn;
				btn.classList.add('selected');
				updateSubmitState();
			});
		});

		const statusMsg = document.getElementById('status-msg');

		function setStatus(text, type) {
			statusMsg.textContent = text;
			statusMsg.className = type; // 'pending', 'success', 'error', or ''
		}

		function resetSelection() {
			if (selectedIndex !== null) markers[selectedIndex].setIcon(makeIcon(false));
			selectedIndex = null;
			select.value = '';
			if (selectedCondition) selectedCondition.classList.remove('selected');
			selectedCondition = null;
			updateSubmitState();
		}

		submitBtn.addEventListener('click', async () => {
			const container = containers[parseInt(select.value, 10)];
			const condition = parseInt(selectedCondition.dataset.condition, 10);

			submitBtn.disabled = true;
			setStatus(t('sending'), 'pending');

			try {
				const response = await fetch('/submit', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ container_oc: container.oc, condition }),
				});
				if (!response.ok) throw new Error(`Server error ${response.status}`);
				setStatus(t('submitted'), 'success');
				resetSelection();
				setTimeout(() => setStatus('', ''), 3000);
			} catch (e) {
				setStatus(`${t('failed')} (${e.message})`, 'error');
				submitBtn.disabled = false;
			}
		});
	</script>
</body>
</html>
