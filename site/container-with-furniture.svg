<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Container scaled to ~55% to leave room for scene elements -->
  <use href="container-with-bag.svg" width="200" height="200"/>

  <!-- Boards leaning against right side of container -->
  <g stroke-linecap="round" transform="translate(160,172) scale(1.2) translate(-160,-167)">
    <line x1="150" y1="167" x2="133" y2="81" stroke="#C4995A" stroke-width="9"/>
    <line x1="160" y1="167" x2="142" y2="86" stroke="#B8894E" stroke-width="9"/>
    <line x1="171" y1="165" x2="153" y2="92" stroke="#C4995A" stroke-width="9"/>
    <!-- Wood grain lines on boards -->
    <line x1="150" y1="167" x2="133" y2="81" stroke="#9B7238" stroke-width="1.5" opacity="0.5"/>
    <line x1="160" y1="167" x2="142" y2="86" stroke="#9B7238" stroke-width="1.5" opacity="0.5"/>
    <line x1="171" y1="165" x2="153" y2="92" stroke="#9B7238" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Chair (front view), lower right -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Back legs -->
    <line x1="5"  y1="146" x2="0"  y2="191" stroke="#7A5C1E" stroke-width="4"/>
    <line x1="50" y1="146" x2="54" y2="191" stroke="#7A5C1E" stroke-width="4"/>
    <!-- Front legs -->
    <line x1="9"  y1="152" x2="6"  y2="191" stroke="#7A5C1E" stroke-width="4"/>
    <line x1="45" y1="152" x2="48" y2="191" stroke="#7A5C1E" stroke-width="4"/>
    <!-- Seat -->
    <rect x="0" y="139" width="54" height="11" rx="1.5" fill="#C4995A" stroke="#8B6914" stroke-width="1.2"/>
    <!-- Back uprights -->
    <line x1="5"  y1="139" x2="2"  y2="85" stroke="#7A5C1E" stroke-width="4"/>
    <line x1="50" y1="139" x2="47" y2="85" stroke="#7A5C1E" stroke-width="4"/>
    <!-- Back slats -->
    <rect x="2" y="83"  width="47" height="8" rx="1.5" fill="#C4995A" stroke="#8B6914" stroke-width="1.1"/>
    <rect x="2" y="101" width="47" height="8" rx="1.5" fill="#C4995A" stroke="#8B6914" stroke-width="1.1"/>
    <rect x="2" y="119" width="47" height="8" rx="1.5" fill="#C4995A" stroke="#8B6914" stroke-width="1.1"/>
  </g>
</svg>
